<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet 2.0</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c5cfc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wallet 2.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#222230;
  --border:#2a2a3a;--border2:#363650;
  --text:#e8e8f0;--text2:#9090b0;--text3:#5a5a7a;
  --green:#00e5a0;--green-bg:rgba(0,229,160,0.08);
  --red:#ff5c6b;--red-bg:rgba(255,92,107,0.08);
  --blue:#5b8df0;--blue-bg:rgba(91,141,240,0.1);
  --accent:#7c5cfc;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px}
.app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:15px;height:15px}
.logo-text{font-size:16px;font-weight:600;letter-spacing:-0.3px}
.logo-ver{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:4px}
.hdr-right{display:flex;align-items:center;gap:12px}
.upd-txt{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Syne',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn svg{width:13px;height:13px}
.spin-icon{animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* NAV */
.nav{display:flex;align-items:center;gap:4px;padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:57px;z-index:9}
.nb{background:none;border:none;color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Syne',sans-serif;white-space:nowrap;transition:all .2s;letter-spacing:.3px}
.nb:hover{color:var(--text);background:var(--bg3)}
.nb.active{background:var(--accent);color:white}
.nsep{width:1px;height:16px;background:var(--border);margin:0 4px;flex-shrink:0}

/* CONTENT */
.content{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px;max-width:1400px;width:100%}

/* OWNER BAR */
.owner-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.oc{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Syne',sans-serif;transition:all .2s;white-space:nowrap}
.oc:hover{border-color:var(--border2);color:var(--text)}
.oc.active{background:var(--accent);border-color:var(--accent);color:white}

/* METRICS */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.ml{font-size:9px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px;font-family:'DM Mono',monospace}
.mv{font-size:22px;font-weight:600;line-height:1;letter-spacing:-.5px}
.ms{font-size:10px;color:var(--text2);margin-top:4px;font-family:'DM Mono',monospace}
.mc.pos .mv{color:var(--green)}
.mc.neg .mv{color:var(--red)}
.mc.neu .mv{color:var(--text)}
.mc.blu .mv{color:var(--blue)}

/* SECTION */
.st{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px}

/* TABLE */
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto}
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{padding:9px 14px;text-align:left;color:var(--text3);font-weight:400;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.8px;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap}
.dt th.r{text-align:right}
.dt td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap}
.dt td.r{text-align:right;font-family:'DM Mono',monospace;font-size:11px}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:var(--bg3)}
.sym{font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
.pos{color:var(--green)}
.neg{color:var(--red)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-family:'DM Mono',monospace}
.badge.p{background:var(--green-bg);color:var(--green)}
.badge.n{background:var(--red-bg);color:var(--red)}

/* CHART */
.cw{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.cc{position:relative;width:100%;height:200px}

/* PRICE GRID */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.ps{font-size:10px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);margin-bottom:4px}
.pv{font-size:14px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
.pr{font-size:9px;color:var(--text3);margin-top:3px}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}

/* STATE */
.sb{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--text2)}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
.err-box{background:var(--red-bg);border:1px solid rgba(255,92,107,.3);border-radius:8px;padding:12px 16px;color:var(--red);font-size:12px;font-family:'DM Mono',monospace;line-height:1.6}
.info-box{background:var(--blue-bg);border:1px solid rgba(91,141,240,.3);border-radius:8px;padding:12px 16px;color:var(--blue);font-size:12px;line-height:1.6}

/* GLOBAL ROW */
.g-row td:first-child{color:var(--text);font-weight:500}

/* ALLOCATION BAR */
.alloc-bar{width:60px;height:4px;background:var(--border);border-radius:2px;display:inline-block;vertical-align:middle;margin-left:6px;overflow:hidden}
.alloc-fill{height:100%;background:var(--accent);border-radius:2px}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 15 15" fill="none">
        <path d="M7.5 1L14 4.8V10.2L7.5 14L1 10.2V4.8L7.5 1Z" stroke="white" stroke-width="1.5"/>
        <circle cx="7.5" cy="7.5" r="1.8" fill="white"/>
      </svg>
    </div>
    <span class="logo-text">Wallet 2.0<span class="logo-ver">beta</span></span>
  </div>
  <div class="hdr-right">
    <span class="upd-txt" id="upd-txt">Sin datos</span>
    <button class="btn" id="btn-refresh" onclick="loadAll()">
      <svg id="refresh-icon" viewBox="0 0 15 15" fill="none"><path d="M1.5 7.5A6 6 0 1 0 3 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M1.5 1.5V4.5H4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Actualizar
    </button>
  </div>
</div>

<div class="nav">
  <button class="nb active" onclick="sv('dashboard',this)">Dashboard</button>
  <button class="nb" onclick="sv('portfolio',this)">Portfolio</button>
  <button class="nb" onclick="sv('performance',this)">Performance</button>
  <div class="nsep"></div>
  <button class="nb" onclick="sv('global',this)">Global</button>
  <button class="nb" onclick="sv('prices',this)">Precios</button>
</div>

<div class="content" id="ct">
  <div class="sb"><div class="spinner"></div><span>Conectando con Wallet 2.0...</span></div>
</div>

</div>

<script>
const WA_URL = 'https://script.google.com/macros/s/AKfycbz9r4GdvrDJ9fYWZknmWNBM20xwam5qv3y7uXKWjNe2sLN9OgSfVvOivw5PrFivj7FR/exec';
const TOKEN  = 'Y5645693N';
const OWNERS = ['Juan Miguel','Cristian','Daniel','Juan Pablo','Iker','Maryori','Lucy','TEDOS','Jesus Eduardo','Jesus Jonas'];

let STATE = { view:'dashboard', owner:'Juan Miguel', data:null, err:null, loading:false };
let charts = {};

// ─── DATA ───────────────────────────────────────────────────────────────────

async function loadAll() {
  if (STATE.loading) return;
  STATE.loading = true;
  STATE.err = null;
  setRefreshState(true);
  rc();

  try {
    const res = await fetch(`${WA_URL}?token=${TOKEN}&t=${Date.now()}`, {cache: 'no-store'});
    if (!res.ok) throw new Error(`HTTP ${res.status} — verifica que la Web App está publicada correctamente`);
    const raw = await res.json();
    if (raw.error) throw new Error(raw.error);
    STATE.data = parseData(raw);
    document.getElementById('upd-txt').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-ES');
  } catch(e) {
    STATE.err = e.message;
  }

  STATE.loading = false;
  setRefreshState(false);
  rc();
}

function setRefreshState(loading) {
  const btn = document.getElementById('btn-refresh');
  const ico = document.getElementById('refresh-icon');
  btn.disabled = loading;
  ico.classList.toggle('spin-icon', loading);
}

function pn(v) {
  if (v === null || v === undefined || v === '') return 0;
  // Handle Date objects from Apps Script
  if (v instanceof Date || (typeof v === 'object' && v !== null)) return 0;
  let s = String(v).trim();
  // Remove currency symbols and spaces
  s = s.replace(/[$€\s]/g, '');
  // Spanish format: 136.314,74 → remove dots as thousands sep, replace comma with dot
  if (s.match(/^\-?\d{1,3}(\.\d{3})+(,\d+)?$/)) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else {
    // Simple comma as decimal
    s = s.replace(',', '.');
  }
  return parseFloat(s) || 0;
}

function fmtDate(v) {
  if (!v) return '';
  // Already a clean date string like "01/05/2026"
  if (typeof v === 'string' && v.match(/^\d{2}\/\d{2}\/\d{4}$/)) return v;
  // ISO string like "2026-05-01T14:02:29.536Z"
  if (typeof v === 'string' && v.includes('T')) {
    const d = new Date(v);
    if (!isNaN(d)) return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
  }
  // Date object or serial number
  if (typeof v === 'number') {
    // Google Sheets serial date
    const d = new Date((v - 25569) * 86400 * 1000);
    if (!isNaN(d)) return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
  }
  if (v instanceof Date) {
    return v.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
  }
  // Try parsing anything else
  const d = new Date(v);
  if (!isNaN(d)) return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
  return String(v);
}

function parseData(raw) {
  const ph = (raw.portfolio_history || []).slice(1)
    .map(r => ({
      date: fmtDate(r[0]),
      owner: String(r[1]||'').trim(),
      cv:  pn(r[2]), inv: pn(r[3]), sell: pn(r[4]),
      ci:  pn(r[5]), np:  pn(r[6]), roi:  pn(r[7])
    }))
    .filter(r => r.owner && r.date);

  const wp = (raw.wallet_prices || []).slice(1)
    .map(r => ({
      upd: String(r[0]||''), sym: String(r[1]||'').trim(),
      name: String(r[2]||''), price: pn(r[3]), src: String(r[4]||'')
    }))
    .filter(r => r.sym);

  const ps = (raw.portfolio_summary || []).slice(1)
    .map(r => ({
      owner: String(r[0]||'').trim(),
      sym:   String(r[1]||'').trim(),
      qty:   pn(r[2]),
      cp:    pn(r[3]),
      buy:   pn(r[4]),
      sell:  pn(r[5]),
      ci:    pn(r[6]),
      cv:    pn(r[7]),
      up:    pn(r[8]),
      np:    pn(r[9]),
      roi:   pn(r[10])
    }))
    .filter(r => r.owner && r.sym);

  const dg_raw = raw.dashboard_global || [];
  // Row 0 = headers: [last_update_cell, owner1, owner2, ...]
  // Row 1 = Total Value, Row 2 = Buy USD, Row 3 = Sell USD
  // Row 4 = Current Investment, Row 5 = Net Profit, Row 6 = ROI Total
  let dg = {};
  if (dg_raw.length >= 7) {
    const owners_row = dg_raw[0]; // [last_update, JuanMiguel, Cristian, ...]
    const last_update = String(owners_row[0] || '');
    for (let col = 1; col < owners_row.length; col++) {
      const owner = String(owners_row[col] || '').trim();
      if (!owner) continue;
      dg[owner] = {
        last_update,
        cv:   pn(dg_raw[1] ? dg_raw[1][col] : 0),
        buy:  pn(dg_raw[2] ? dg_raw[2][col] : 0),
        sell: pn(dg_raw[3] ? dg_raw[3][col] : 0),
        ci:   pn(dg_raw[4] ? dg_raw[4][col] : 0),
        np:   pn(dg_raw[5] ? dg_raw[5][col] : 0),
        roi:  pn(dg_raw[6] ? dg_raw[6][col] : 0)
      };
    }
  }

  return { ph, wp, ps, dg };
}

// ─── HELPERS ────────────────────────────────────────────────────────────────

function snap(owner) {
  const rows = STATE.data.ph.filter(r => r.owner === owner);
  if (!rows.length) return null;
  return rows.reduce((a,b) => new Date(a.date) > new Date(b.date) ? a : b);
}

function hist(owner) {
  return STATE.data.ph
    .filter(r => r.owner === owner)
    .sort((a,b) => new Date(a.date) - new Date(b.date));
}

function port(owner) {
  return STATE.data.ps
    .filter(r => r.owner === owner)
    .sort((a,b) => b.cv - a.cv);
}

function f(n, d=0) {
  if (isNaN(n) || n === null) return '—';
  const abs = Math.abs(n);
  const str = abs.toLocaleString('es-ES', {minimumFractionDigits:d, maximumFractionDigits:d});
  return (n < 0 ? '-' : '') + '$' + str;
}

function fp(roi) {
  const v = roi * 100;
  return (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
}

function sg(n) { return n >= 0 ? 'pos' : 'neg'; }

function dateLabel(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('es-ES', {month:'short', year:'2-digit'});
}

function qtyFmt(q) {
  if (q === 0) return '0';
  if (q < 0.00001) return q.toFixed(10);
  if (q < 0.001)   return q.toFixed(8);
  if (q < 1)       return q.toFixed(4);
  return q.toLocaleString('es-ES', {maximumFractionDigits:4});
}

function priceFmt(p) {
  if (p === 0)      return '$0';
  if (p < 0.00001)  return '$' + p.toFixed(10);
  if (p < 0.001)    return '$' + p.toFixed(8);
  if (p < 1)        return '$' + p.toFixed(5);
  return f(p, 2);
}

// ─── CHARTS ─────────────────────────────────────────────────────────────────

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function makeLineChart(id, labels, data, color) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  charts[id] = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: color.replace(')',',0.08)').replace('rgb','rgba'),
        borderWidth: 2, fill: true, tension: 0.4,
        pointRadius: 2, pointHoverRadius: 5,
        pointBackgroundColor: color
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a24', borderColor: '#2a2a3a', borderWidth: 1,
          callbacks: { label: v => '$' + Math.round(v.parsed.y).toLocaleString('es-ES') }
        }
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#5a5a7a',font:{size:10},maxRotation:45,maxTicksLimit:14} },
        y: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#5a5a7a',font:{size:10},callback:v=>'$'+Math.round(v).toLocaleString('es-ES')} }
      }
    }
  });
}

function makeBarChart(id, labels, data) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  charts[id] = new Chart(el, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map(v => v >= 0 ? 'rgba(0,229,160,0.6)' : 'rgba(255,92,107,0.6)'),
        borderRadius: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a24', borderColor: '#2a2a3a', borderWidth: 1,
          callbacks: { label: v => '$' + Math.round(v.parsed.y).toLocaleString('es-ES') }
        }
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#5a5a7a',font:{size:10},maxRotation:45,maxTicksLimit:14} },
        y: { grid:{color:'rgba(255,255,255,0.03)'}, ticks:{color:'#5a5a7a',font:{size:10},callback:v=>'$'+Math.round(v).toLocaleString('es-ES')} }
      }
    }
  });
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

function sv(view, btn) {
  STATE.view = view;
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  rc();
}

function so(owner) {
  STATE.owner = owner;
  document.querySelectorAll('.oc').forEach(c => c.classList.toggle('active', c.dataset.o === owner));
  rc();
}

function obar() {
  return `<div class="owner-bar">${OWNERS.map(o =>
    `<button class="oc${o===STATE.owner?' active':''}" data-o="${o}" onclick="so('${o}')">${o}</button>`
  ).join('')}</div>`;
}

// ─── VIEWS ──────────────────────────────────────────────────────────────────

function vDash() {
  const dg = STATE.data.dg;
  const s = dg[STATE.owner];
  const h = hist(STATE.owner);
  const p = port(STATE.owner);

  if (!s) return `<div class="err-box">Sin datos para <strong>${STATE.owner}</strong> en dashboard_global.</div>`;

  const roi = s.roi; // already percentage e.g. 136.81
  const top5 = p.slice(0, 5);
  const labs = h.map(r => dateLabel(r.date));
  const vals = h.map(r => r.cv);

  const html = `
    ${obar()}
    <div class="mg">
      <div class="mc neu">
        <div class="ml">Total Value</div>
        <div class="mv">${f(s.cv, 0)}</div>
        <div class="ms">valor actual portfolio</div>
      </div>
      <div class="mc ${sg(s.np)}">
        <div class="ml">Net Profit</div>
        <div class="mv">${f(s.np, 0)}</div>
        <div class="ms">${s.np >= 0 ? 'ganancia neta' : 'pérdida neta'}</div>
      </div>
      <div class="mc ${sg(roi)}">
        <div class="ml">ROI Total</div>
        <div class="mv">${(roi >= 0 ? '+' : '') + roi.toFixed(1) + '%'}</div>
        <div class="ms">sobre compras históricas</div>
      </div>
      <div class="mc blu">
        <div class="ml">Buy USD</div>
        <div class="mv" style="font-size:18px">${f(s.buy, 0)}</div>
        <div class="ms">invertido histórico</div>
      </div>
      <div class="mc neu">
        <div class="ml">Sell USD</div>
        <div class="mv" style="font-size:18px">${f(s.sell, 0)}</div>
        <div class="ms">vendido histórico</div>
      </div>
      <div class="mc neu">
        <div class="ml">Cap. Activo</div>
        <div class="mv" style="font-size:18px">${f(s.ci, 0)}</div>
        <div class="ms">buy − sell</div>
      </div>
    </div>

    <div class="cw">
      <div class="st">Evolución del patrimonio</div>
      <div class="cc"><canvas id="ch-dash" role="img" aria-label="Evolución patrimonio ${STATE.owner}"></canvas></div>
    </div>

    <div>
      <div class="st">Top activos por valor</div>
      <div class="tw">
        <table class="dt">
          <thead><tr>
            <th>Activo</th>
            <th class="r">Valor actual</th>
            <th class="r">Net Profit</th>
            <th class="r">ROI</th>
          </tr></thead>
          <tbody>${top5.map(a => `<tr>
            <td><span class="sym">${a.sym}</span></td>
            <td class="r">${f(a.cv, 2)}</td>
            <td class="r ${sg(a.np)}">${f(a.np, 2)}</td>
            <td class="r"><span class="badge ${sg(a.np)==='pos'?'p':'n'}">${fp(a.roi)}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  `;

  setTimeout(() => makeLineChart('ch-dash', labs, vals, 'rgb(124,92,252)'), 50);
  return html;
}

function vPort() {
  const p = port(STATE.owner);
  if (!p.length) return `<div class="err-box">Sin datos de portfolio para <strong>${STATE.owner}</strong>.</div>`;

  const tot = p.reduce((s,a) => s + a.cv, 0);

  return `
    ${obar()}
    <div class="tw">
      <table class="dt">
        <thead><tr>
          <th>Activo</th>
          <th class="r">Cantidad</th>
          <th class="r">Precio</th>
          <th class="r">Valor</th>
          <th class="r">Buy USD</th>
          <th class="r">Sell USD</th>
          <th class="r">Cap. Activo</th>
          <th class="r">Net Profit</th>
          <th class="r">ROI</th>
          <th class="r">% Alloc</th>
        </tr></thead>
        <tbody>${p.map(a => {
          const al = tot > 0 ? (a.cv / tot * 100) : 0;
          return `<tr>
            <td><span class="sym">${a.sym}</span></td>
            <td class="r" style="color:var(--text3)">${qtyFmt(a.qty)}</td>
            <td class="r">${priceFmt(a.cp)}</td>
            <td class="r">${f(a.cv, 2)}</td>
            <td class="r" style="color:var(--text3)">${f(a.buy, 2)}</td>
            <td class="r" style="color:var(--text3)">${f(a.sell, 2)}</td>
            <td class="r" style="color:var(--text3)">${f(a.ci, 2)}</td>
            <td class="r ${sg(a.np)}">${f(a.np, 2)}</td>
            <td class="r"><span class="badge ${sg(a.np)==='pos'?'p':'n'}">${fp(a.roi)}</span></td>
            <td class="r">
              <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">${al.toFixed(1)}%</span>
              <span class="alloc-bar"><span class="alloc-fill" style="width:${Math.min(al,100)}%"></span></span>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  `;
}

function vPerf() {
  const h = hist(STATE.owner);
  if (!h.length) return `<div class="err-box">Sin historial para <strong>${STATE.owner}</strong>.</div>`;

  const labs  = h.map(r => dateLabel(r.date));
  const vals  = h.map(r => r.cv);
  const profs = h.map(r => r.np);

  const html = `
    ${obar()}
    <div class="two-col">
      <div class="cw">
        <div class="st">Valor del portfolio</div>
        <div class="cc"><canvas id="ch-val" role="img" aria-label="Valor portfolio ${STATE.owner}"></canvas></div>
      </div>
      <div class="cw">
        <div class="st">Net Profit mensual</div>
        <div class="cc"><canvas id="ch-prof" role="img" aria-label="Net profit ${STATE.owner}"></canvas></div>
      </div>
    </div>

    <div>
      <div class="st">Historial completo</div>
      <div class="tw">
        <table class="dt">
          <thead><tr>
            <th>Fecha</th>
            <th class="r">Valor</th>
            <th class="r">Invertido</th>
            <th class="r">Cap. Activo</th>
            <th class="r">Net Profit</th>
            <th class="r">ROI</th>
          </tr></thead>
          <tbody>${[...h].reverse().map(r => `<tr>
            <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${r.date}</td>
            <td class="r">${f(r.cv, 0)}</td>
            <td class="r" style="color:var(--text3)">${f(r.inv, 0)}</td>
            <td class="r" style="color:var(--text3)">${f(r.ci, 0)}</td>
            <td class="r ${sg(r.np)}">${f(r.np, 0)}</td>
            <td class="r"><span class="badge ${sg(r.np)==='pos'?'p':'n'}">${fp(r.roi)}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  `;

  setTimeout(() => {
    makeLineChart('ch-val', labs, vals, 'rgb(91,141,240)');
    makeBarChart('ch-prof', labs, profs);
  }, 50);
  return html;
}

function vGlobal() {
  if (!STATE.data) return `<div class="err-box">Sin datos cargados.</div>`;

  const dg = STATE.data.dg;
  if (!Object.keys(dg).length) return `<div class="err-box">Sin datos en dashboard_global.</div>`;

  const rows = OWNERS
    .map(o => { const s = dg[o]; if (!s || !s.cv) return null; return { owner:o, ...s }; })
    .filter(Boolean)
    .sort((a,b) => b.cv - a.cv);

  if (!rows.length) return `<div class="err-box">Sin datos en dashboard_global.</div>`;

  const totV = rows.reduce((s,r) => s+r.cv, 0);
  const totP = rows.reduce((s,r) => s+r.np, 0);
  const totI = rows.reduce((s,r) => s+(r.buy||r.inv||0), 0);
  const totROI = totI > 0 ? (totP / totI * 100) : 0;
  const lastUpd = rows[0]?.last_update || '';

  const labs = rows.map(r => r.owner);
  const vals = rows.map(r => r.cv);

  const html = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div class="st" style="margin-bottom:0">Dashboard Global</div>
      <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${lastUpd}</span>
    </div>
    <div class="mg">
      <div class="mc neu">
        <div class="ml">Patrimonio Total</div>
        <div class="mv" style="font-size:18px">${f(totV, 0)}</div>
        <div class="ms">todos los owners</div>
      </div>
      <div class="mc ${sg(totP)}">
        <div class="ml">Net Profit Total</div>
        <div class="mv" style="font-size:18px">${f(totP, 0)}</div>
        <div class="ms">familia</div>
      </div>
      <div class="mc blu">
        <div class="ml">Total Invertido</div>
        <div class="mv" style="font-size:18px">${f(totI, 0)}</div>
        <div class="ms">buy histórico</div>
      </div>
      <div class="mc ${sg(totROI)}">
        <div class="ml">ROI Global</div>
        <div class="mv" style="font-size:18px">${(totROI>=0?'+':'')+totROI.toFixed(1)+'%'}</div>
        <div class="ms">net profit / buy</div>
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="st">Distribución patrimonio</div>
        <div class="cw" style="padding:14px">
          <div class="cc" style="height:220px"><canvas id="ch-global-pie" role="img" aria-label="Distribución patrimonio"></canvas></div>
        </div>
      </div>
      <div>
        <div class="st">Ranking por valor</div>
        <div class="tw">
          <table class="dt">
            <thead><tr>
              <th>#</th><th>Owner</th>
              <th class="r">Valor</th>
              <th class="r">Net Profit</th>
              <th class="r">ROI</th>
            </tr></thead>
            <tbody>${rows.map((r,i) => {
              const roi = r.roi;
              return `<tr class="g-row">
                <td style="color:var(--text3);font-family:'DM Mono',monospace;font-size:11px">${i+1}</td>
                <td>${r.owner}</td>
                <td class="r">${f(r.cv, 0)}</td>
                <td class="r ${sg(r.np)}">${f(r.np, 0)}</td>
                <td class="r"><span class="badge ${sg(r.np)==='pos'?'p':'n'}">${(roi>=0?'+':'')+roi.toFixed(1)+'%'}</span></td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div>
      <div class="st">Detalle completo</div>
      <div class="tw">
        <table class="dt">
          <thead><tr>
            <th>Owner</th>
            <th class="r">Valor</th>
            <th class="r">Net Profit</th>
            <th class="r">ROI</th>
            <th class="r">Buy USD</th>
            <th class="r">Sell USD</th>
            <th class="r">Cap. Activo</th>
            <th class="r">% del total</th>
          </tr></thead>
          <tbody>${rows.map(r => {
            const pct = totV > 0 ? (r.cv / totV * 100) : 0;
            const roi = r.roi;
            return `<tr class="g-row">
              <td>${r.owner}</td>
              <td class="r">${f(r.cv, 0)}</td>
              <td class="r ${sg(r.np)}">${f(r.np, 0)}</td>
              <td class="r"><span class="badge ${sg(r.np)==='pos'?'p':'n'}">${(roi>=0?'+':'')+roi.toFixed(1)+'%'}</span></td>
              <td class="r" style="color:var(--text3)">${f(r.buy||r.inv||0, 0)}</td>
              <td class="r" style="color:var(--text3)">${f(r.sell, 0)}</td>
              <td class="r" style="color:var(--text3)">${f(r.ci, 0)}</td>
              <td class="r">
                <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">${pct.toFixed(1)}%</span>
                <span class="alloc-bar"><span class="alloc-fill" style="width:${Math.min(pct,100)}%"></span></span>
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
  `;

  const COLORS = ['#7c5cfc','#5b8df0','#00e5a0','#f0a93b','#ff5c6b','#5dd8c5','#c084fc','#fb923c','#34d399','#a78bfa'];
  setTimeout(() => {
    destroyChart('ch-global-pie');
    const el = document.getElementById('ch-global-pie');
    if (!el) return;
    charts['ch-global-pie'] = new Chart(el, {
      type: 'doughnut',
      data: {
        labels: labs,
        datasets: [{ data: vals, backgroundColor: COLORS.slice(0, labs.length), borderWidth: 2, borderColor: '#111118' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position:'right', labels:{color:'#9090b0',font:{size:11},boxWidth:12,padding:12} },
          tooltip: { callbacks: { label: c => `${c.label}: $${Math.round(c.parsed).toLocaleString('es-ES')}` } }
        }
      }
    });
  }, 50);
  return html;
}

function vPrices() {
  if (!STATE.data?.wp?.length) return `<div class="err-box">Sin datos de precios.</div>`;
  const p = STATE.data.wp;
  const upd = p[0]?.upd || '';
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="st" style="margin-bottom:0">Precios actuales</div>
      <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${upd}</span>
    </div>
    <div class="pg">
      ${p.map(x => `
        <div class="pc">
          <div class="ps">${x.sym}</div>
          <div class="pv">${priceFmt(x.price)}</div>
          <div class="pr">${x.src}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function rc() {
  const el = document.getElementById('ct');
  if (!el) return;

  if (STATE.loading && !STATE.data) {
    el.innerHTML = `<div class="sb"><div class="spinner"></div><span>Cargando datos...</span></div>`;
    return;
  }

  if (STATE.err) {
    el.innerHTML = `
      <div class="err-box">
        <strong>Error al conectar:</strong><br>${STATE.err}<br><br>
        Verifica que la Web App de Apps Script está publicada con acceso "Cualquier persona".
      </div>
    `;
    return;
  }

  if (!STATE.data) return;

  if      (STATE.view === 'dashboard')   el.innerHTML = vDash();
  else if (STATE.view === 'portfolio')   el.innerHTML = vPort();
  else if (STATE.view === 'performance') el.innerHTML = vPerf();
  else if (STATE.view === 'global')      el.innerHTML = vGlobal();
  else if (STATE.view === 'prices')      el.innerHTML = vPrices();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
